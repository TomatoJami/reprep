<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h1>Welcome</h1>

<a id="authButton" href="/login">
  <button id="authBtn">Login</button>
</a>

<br><br>

<a id="buyLink" href="#" style="display: none;">
  <button>Buy PRO</button>
</a>

<script>
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  alert("✅ Payment successful! PRO activated.");
}

async function init() {

  const auth = await fetch("/auth-status").then(r => r.json());
  const pro = await fetch("/pro-status").then(r => r.json());

  const btn = document.getElementById("authBtn");
  const link = document.getElementById("authButton");
  const buy = document.getElementById("buyLink");

  if (auth.loggedIn) {
    btn.textContent = "Logout";
    link.href = "/logout";

    if (!pro.pro) {
      buy.style.display = "inline";
    }
  }

  if (!pro.pro) {
    const payment = await fetch("/payment-link").then(r => r.json());
    buy.href = payment.url;
  }

}

init();
</script>
