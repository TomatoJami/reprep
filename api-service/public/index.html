<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h1>Welcome</h1>

<a id="authButton" href="/login">
  <button id="btn">Login</button>
</a>

<script>
fetch("/auth-status")
  .then(res => res.json())
  .then(data => {
    const btn = document.getElementById("btn");
    const link = document.getElementById("authButton");

    if (data.loggedIn) {
      btn.textContent = "Logout";
      link.href = "/logout";
    }
  });
</script>

</body>
</html>
