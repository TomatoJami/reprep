<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .pro-status { font-weight: bold; color: green; font-size: 18px; }
  </style>
</head>
<body>

<h1>Welcome to My Team</h1>

<a id="authButton" href="/login">
  <button id="authBtn">Login</button>
</a>

<br><br>

<div id="buyContainer">
  <a id="buyLink" href="#">
    <button>Buy PRO</button>
  </a>
  <span id="proText" class="pro-status" style="display:none;">✅ You are PRO!</span>
</div>

<script>
async function init() {
  const auth = await fetch("/auth-status").then(r => r.json());
  const pro = await fetch("/pro-status").then(r => r.json());

  const btn = document.getElementById("authBtn");
  const link = document.getElementById("authButton");
  const buy = document.getElementById("buyLink");
  const proText = document.getElementById("proText");

  if (auth.loggedIn) {
    btn.textContent = "Logout";
    link.href = "/logout";

    if (pro.pro) {
      buy.style.display = "none";
      proText.style.display = "inline";
    } else {
      buy.style.display = "inline";
      const payment = await fetch("/create-checkout-session").then(r => r.json());
      buy.href = payment.url;
    }
  }
}

init();
</script>

</body>
</html>
