<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RePrep</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 420px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #fff;
      color: #0f0f0f;
    }

    .btn-pro {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }

    .btn-logout {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }

    .pro-badge {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<div id="toast" class="toast">Payment successful! PRO activated.</div>

<div class="container">
  <h1>RePrep</h1>
  <p class="subtitle" id="teamName"></p>

  <div class="actions">
    <a id="authButton" href="/login">
      <button class="btn btn-primary" id="authBtn">Login</button>
    </a>

    <a id="buyLink" href="#" style="display: none;">
      <button class="btn btn-pro">Upgrade to PRO</button>
    </a>

    <div class="pro-badge" id="proBadge">&#x2728; You are PRO</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
if (params.get("success") === "true") {
  const toast = document.getElementById("toast");
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 4000);
  history.replaceState({}, "", "/");
}

async function init() {
  const [auth, pro, info] = await Promise.all([
    fetch("/auth-status").then(r => r.json()),
    fetch("/pro-status").then(r => r.json()),
    fetch("/api/info").then(r => r.json()),
  ]);

  document.getElementById("teamName").textContent = info.team;

  const btn = document.getElementById("authBtn");
  const link = document.getElementById("authButton");
  const buy = document.getElementById("buyLink");
  const badge = document.getElementById("proBadge");

  if (auth.loggedIn) {
    btn.textContent = "Logout";
    btn.className = "btn btn-logout";
    link.href = "/logout";

    if (pro.pro) {
      badge.style.display = "block";
    } else {
      buy.style.display = "inline";
      const payment = await fetch("/payment-link").then(r => r.json());
      buy.href = payment.url;
    }
  }
}

init();
</script>
