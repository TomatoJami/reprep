<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h1>Welcome</h1>

<a id="authButton" href="/login">
  <button id="authBtn">Login</button>
</a>

<br><br>

<a id="buyLink" href="#">
  <button>Buy PRO</button>
</a>

<script>
fetch("/auth-status")
  .then(res => res.json())
  .then(data => {
    const btn = document.getElementById("authBtn");
    const link = document.getElementById("authButton");

    if (data.loggedIn) {
      btn.textContent = "Logout";
      link.href = "/logout";
    }
  });

fetch("/payment-link")
  .then(res => res.json())
  .then(data => {
    document.getElementById("buyLink").href = data.url;
  });
</script>
